[tox]
requires =
    tox>=4.45.0
env_list = lint, type, 3.1{5,4,3,2,1}

[testenv]
description = run unit tests
deps =
    pytest>=9.0.2
    pytest-sugar>=1.1.1
commands =
    pytest {posargs:tests}

[testenv:lint]
description = run linters
skip_install = true
deps =
    black>=26.1.0
commands = black {posargs:.}

[testenv:type]
description = run type checks
deps =
    mypy>=1.19.1
commands =
    mypy {posargs:src tests}
